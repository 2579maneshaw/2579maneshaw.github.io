<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facebook Discount</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f7fa;
}

.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  text-align: center;
}

select, button, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  font-size: 16px;
}

button {
  background: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.preview {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 6px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>
<div class="container">

<h1>Facebook Discount</h1>

<label>Select Dates</label>
<select id="dateSelect"></select>

<button id="copyBtn">Copy Comment</button>

<button id="postBtn">Go to Facebook Post</button>

<div class="preview">
<strong>Email Preview:</strong>
<p>
<a href="https://www.airbnb.com/rooms/1626958722930248767?viralityEntryPoint=1&s=76&source_impression_id=p3_1771862170_P3u5M5-NH7ujRrFY">
Our Happily Ever After House 10 Min to Disney
</a>
</p>
</div>

</div>

<script>
// LOAD DATES WITH COMMENTS SUPPORT
fetch('/discount/dates')
  .then(res => res.text())
  .then(text => {
    const lines = text
      .split(/\r?\n/)
      .map(line => line.split("#")[0].trim())
      .filter(line => line);

    const select = document.getElementById("dateSelect");

    lines.forEach(line => {
      const option = document.createElement("option");
      option.value = line;
      option.textContent = line;
      select.appendChild(option);
    });
  });

// COPY BUTTON
document.getElementById("copyBtn").addEventListener("click", () => {
  const date = document.getElementById("dateSelect").value;

  const text = `Interested in booking:\n${date}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }

  alert("Copied! Now paste into Facebook comment.");
});

// LOAD FB POST LINK
fetch('/discount/fbpost.txt')
  .then(res => res.text())
  .then(link => {
    document.getElementById("postBtn").onclick = () => {
      window.open(link.trim(), "_blank");
    };
  });
</script>

</body>
</html>
