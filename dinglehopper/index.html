<script>
  // Track a custom event for podcast landing visits
  if (typeof gtag === 'function') {
    gtag('event', 'podcast_visit', {
      event_category: 'marketing',
      event_label: 'dinglehopper'
    });
  }

  // Redirect after a very short delay so analytics has time to fire
  setTimeout(function () {
    window.location.replace('/');
  }, 900);
</script>
