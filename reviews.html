---
layout: default
title: Reviews
nav: reviews
---

<style>

.reviewsWrap{
  max-width:1100px;
  margin:0 auto;
  padding:18px 16px 60px;
}

.reviewCarousel{
  position:relative;
  width:100%;
  height:440px;
  border-radius:16px;
  border:1px solid #eee;
  background:#fafafa;
  overflow:hidden;
  box-shadow:0 10px 26px rgba(0,0,0,0.05);
}

.reviewSlide{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity .6s ease;
  cursor:zoom-in;
}

.reviewSlide.active{
  opacity:1;
}

/* modal */

.reviewModal{
  display:none;
  position:fixed;
  inset:0;
  z-index:9999;
  background:rgba(0,0,0,.86);
  align-items:center;
  justify-content:center;
  padding:20px;
}

.reviewModal.open{
  display:flex;
}

#reviewModalImg{
  max-width:95vw;
  max-height:90vh;
  border-radius:12px;
}

.reviewModalClose{
  position:absolute;
  top:14px;
  right:16px;
  width:44px;
  height:44px;
  border-radius:999px;
  border:none;
  background:rgba(255,255,255,.2);
  color:#fff;
  font-size:28px;
  cursor:pointer;
}

@media (max-width:860px){
  .reviewCarousel{
    height:320px;
  }
}

</style>


<div class="reviewsWrap">

<div class="reviewCarousel">

{% assign review_files = site.static_files
| where_exp: "f", "f.path contains '/photos/reviewGallery/'"
| where_exp: "f", "f.extname == '.webp'"
| sort: "path"
%}

{% for f in review_files %}

<img
class="reviewSlide {% if forloop.first %}active{% endif %}"
src="{{ f.path | relative_url }}"
alt="Guest review {{ forloop.index }}"
loading="lazy"
decoding="async"
/>

{% endfor %}

</div>

</div>


<!-- modal -->
<div id="reviewModal" class="reviewModal">
<button class="reviewModalClose" onclick="closeReviewModal()">×</button>
<img id="reviewModalImg">
</div>


<script>

(function(){

const slides = document.querySelectorAll(".reviewSlide");
if(!slides.length) return;

let index = 0;

function show(i){

slides.forEach(s => s.classList.remove("active"));
slides[i].classList.add("active");

}

function next(){

index++;

if(index >= slides.length){
index = 0;
}

show(index);

}

setInterval(next,3500);

/* click to enlarge */

slides.forEach(img=>{
img.addEventListener("click",()=>{
openReviewModal(img.src);
});
});

})();

function openReviewModal(src){

const modal=document.getElementById("reviewModal");
const img=document.getElementById("reviewModalImg");

img.src=src;

modal.classList.add("open");
document.body.style.overflow="hidden";

}

function closeReviewModal(){

const modal=document.getElementById("reviewModal");

modal.classList.remove("open");
document.body.style.overflow="";

}

</script>
