<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

<style>
.reviewsHandwritten{
  display:block;
  width:100%;
  text-align:center;
  margin-top:10px;
  font-family:"Caveat", cursive;
  font-size:30px;
  line-height:1;
  color:#c62828;
  text-decoration:none;
  transform:rotate(-1deg);
  opacity:.95;
  transition:all .2s ease;
}

.reviewsHandwritten:hover{
  color:#a91f23;
  opacity:1;
  transform:rotate(0deg);
}

.brandTagline{
  margin-top:8px;
  margin-bottom:8px;
  line-height:1.15;
}

.brandAltName{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:0;
  margin-bottom:2px;
  font-size:0.82rem;
  color:#777;
  line-height:1.2;
  text-decoration:none;
}

.brandAltName:link,
.brandAltName:visited,
.brandAltName:hover,
.brandAltName:active{
  color:#777;
  text-decoration:none;
}

.brandAltName:hover{
  cursor:pointer;
  opacity:.92;
}

.airbnbLogo{
  width:22px;
  height:22px;
  object-fit:contain;
  flex:0 0 auto;
  transform:translateY(1px);
}

/* BACKGROUND SYSTEM (only addition) */
.siteHeader{
  position:relative;
  overflow:hidden;
}

.siteHeaderFallback{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:.14;
  z-index:0;
  transition:background-image .8s ease;
}

.siteHeaderVideo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.12;
  pointer-events:none;
  z-index:1;
}

.headerInner{
  position:relative;
  z-index:2;
}

.siteHeader.video-failed .siteHeaderVideo{
  display:none;
}

@media (max-width:860px){
  .brandTagline{ margin-top:6px; margin-bottom:6px; }
  .brandAltName{ font-size:0.78rem; gap:8px; }
  .airbnbLogo{ width:20px; height:20px; }
  .reviewsHandwritten{ margin-top:12px; }
}
</style>

<header class="siteHeader" id="siteHeader">

  <!-- FALLBACK IMAGE LAYER -->
  <div class="siteHeaderFallback" id="siteHeaderFallback"></div>

  <!-- VIDEO -->
  <video class="siteHeaderVideo" id="siteHeaderVideo" autoplay muted loop playsinline webkit-playsinline preload="metadata">
    <source src="videos/2579_Maneshaw_Ln.mp4" type="video/mp4">
  </video>

  <div class="headerInner">

    <a class="brandBlock" href="/" aria-label="Home">
      <picture class="brandLogo">
        <source type="image/webp"
          srcset="/photos/EVWHlogo-320w.webp 320w, /photos/EVWHlogo-600w.webp 600w">
        <img
          src="/photos/EVWHlogo-600w.jpg"
          srcset="/photos/EVWHlogo-320w.jpg 320w, /photos/EVWHlogo-600w.jpg 600w"
          sizes="180px"
          alt="Enchanted Villa logo"
          width="180"
          height="168"
        />
      </picture>
    </a>

    <div class="headerMid">

      <div class="brandText">
        <div class="brandName">Enchanted Villa of Windsor Hills Townhome</div>
        <div class="brandTagline"><em>Your Pause Between the Parks</em></div>

        <a class="brandAltName"
           href="https://www.airbnb.com/rooms/1626958722930248767"
           target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Airbnb_Logo_B%C3%A9lo.svg" class="airbnbLogo">
          <span>Our Happily Ever After House</span>
        </a>
      </div>

      <nav class="mainNav">
        <a href="/">Home</a>
        <a href="/villa.html">Our Townhome</a>
        <a href="/nearby.html">Nearby</a>
        <a href="/attractions.html">Attractions</a>
        <a href="/windsor-hills.html">Windsor Hills</a>
        <a href="/petpolicy.html">Pet Policy</a>
      </nav>

      <a class="reviewsHandwritten" href="/reviews.html">
        Read our Reviews!
      </a>

    </div>

    <div class="headerRight">

      <a class="headerCTA"
         href="https://www.airbnb.com/rooms/1626958722930248767"
         target="_blank">
        Check Availability
      </a>

      <div class="socialIcons">
        <!-- unchanged -->
      </div>

    </div>

  </div>
</header>

<script>
(function () {
  const header = document.getElementById('siteHeader');
  const video = document.getElementById('siteHeaderVideo');
  const fallback = document.getElementById('siteHeaderFallback');

  const images = [
    "photos/villagallery/02.webp",
    "photos/villagallery/05.webp",
    "photos/villagallery/07.webp",
    "photos/villagallery/08.webp",
    "photos/villagallery/10.webp",
    "photos/villagallery/12.webp",
    "photos/villagallery/18.webp",
    "photos/villagallery/22.webp",
    "photos/villagallery/24.webp",
    "photos/villagallery/26.webp",
    "photos/villagallery/31.webp",
    "photos/villagallery/33.webp",
    "photos/villagallery/35.webp",
    "photos/villagallery/37.webp",
    "photos/villagallery/39.webp",
    "photos/villagallery/40.webp",
    "photos/villagallery/43.webp",
    "photos/villagallery/44.webp",
    "photos/villagallery/45.webp",
    "photos/villagallery/48.webp",
    "photos/villagallery/49.webp"
  ];

  let i = 0;

  function startSlideshow() {
    header.classList.add('video-failed');
    fallback.style.backgroundImage = `url('${images[i]}')`;

    setInterval(() => {
      i = (i + 1) % images.length;
      fallback.style.backgroundImage = `url('${images[i]}')`;
    }, 4000);
  }

  const play = video.play();
  if (play && play.catch) {
    play.catch(startSlideshow);
  } else {
    video.addEventListener('error', startSlideshow);
  }
})();
</script>
