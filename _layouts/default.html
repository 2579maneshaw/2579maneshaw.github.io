<!doctype html>
<html lang="en">
<head>
  {% include head.html %}

  <!-- Handwritten font for "Read our Reviews" -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  {% include header.html %}

  <main class="pageWrap">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Styles for handwritten "Read our Reviews" link in the header -->
  <style>
    .reviewsHandwritten{
      display:block;
      text-align:center;
      margin-top:6px;

      font-family:'Caveat', cursive;
      font-size:24px;
      font-weight:600;

      color:#222;
      text-decoration:none;

      transform:rotate(-1deg);
      opacity:.9;
      transition:all .2s ease;
    }

    .reviewsHandwritten:hover{
      transform:rotate(0deg);
      opacity:1;
    }
  </style>
</body>
</html>
