<!doctype html>
<html lang="en">
<head>
  {% include head.html %}

  <!-- Handwritten font -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  {% include header.html %}

  <main class="pageWrap">
    {{ content }}
  </main>

  {% include footer.html %}

  <style>

  .reviewsHandwritten{
    display:block;
    width:100%;
    text-align:center;
    margin-top:6px;

    font-family:'Caveat', cursive;
    font-size:26px;
    font-weight:700;

    color:#d40000;
    text-decoration:none;

    transform:rotate(-1deg);
    opacity:.95;

    transition:all .2s ease;
  }

  .reviewsHandwritten:hover{
    color:#a80000;
    transform:rotate(0deg);
  }

  </style>

</body>
</html>
